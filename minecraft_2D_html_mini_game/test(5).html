<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minecraft 2D 探險版［策略更新！］</title>
  <style>
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #7CFC00;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #startScreen h1 { font-size: 72px; margin: 0; color: #000; }
    #startScreen button {
      font-size: 24px;
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background-color: #fff;
      cursor: pointer;
    }
    body {
      margin: 0;
      overflow: hidden;
      background-color: #87CEEB;
      touch-action: manipulation;
      user-select: none;
    }
    canvas { display: block; }
    .top-controls { position: fixed; top: 10px; left: 10px; z-index: 10; }
    .top-controls button {
      font-size: 16px;
      padding: 5px 10px;
      margin-right: 5px;
      border: none;
      border-radius: 5px;
      background-color: #fff;
    }
    #inventoryUI, #iteminventory {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 5px;
      z-index: 10;
    }
    #inventoryUI { top: 60px; }
    #iteminventory { top: 120px; }
    #inventoryUI button, #iteminventory button {
      width: 50px; height: 50px;
      border: 2px solid #000;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }
    #hpDisplay {
      position: fixed;
      top: 10px; right: 10px;
      font-size: 20px;
      background: rgba(255,255,255,0.8);
      padding: 5px 10px;
      border-radius: 5px;
      z-index: 10;
    }
    #leftControls { position: fixed; bottom: 10px; left: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
    #rightControls { position: fixed; bottom: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .control-group { display: flex; gap: 8px; }
    #leftControls button, #rightControls button { font-size: 18px; padding: 10px; border: none; border-radius: 5px; background-color: #fff; touch-action: none; }
    #deathScreen, #craftingScreen, #smeltingScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box;
    }
    #deathScreen { background-color: rgba(255,0,0,0.9); color: white; flex-direction: column; justify-content: center; align-items: center; font-size: 40px; }
    #craftingScreen { background-color: #D2B48C; }
    #smeltingScreen { background-color: #808080; }
    #craftingOptions, #smeltingOptions { display: flex; flex-wrap: wrap; gap: 10px; }
    .closeBtn { margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="startScreen">
    <div style="position: absolute; top: 5px; left: 5px; font-size:10px; color:#000;">test(5)</div>
    <h1>Minecraft 2D</h1>
    <p style="font-size: 24px;">［策略更新！］</p>
    <button id="continueBtn" style="display:none; background-color: #FFD700;" onclick="continueGame();">繼續遊戲</button>
    <button onclick="startAdventure();">探險模式</button>
    <button onclick="startPeaceful();">和平模式</button>
    <button onclick="startCreative();">創造模式</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="top-controls">
    <button onclick="goToHomePage();">主頁面</button>
    <button onclick="openCrafting();">合成</button>
    <button id="smeltBtn" onclick="openSmelting();" style="display:none;">熔煉</button>
  </div>

  <div id="inventoryUI"></div>
  <div id="iteminventory"></div>
  <div id="hpDisplay">HP: 10</div>

  <div id="leftControls">
    <div class="control-group">
      <button ontouchstart="moveLeft();" ontouchend="stopMoving();">←</button>
      <button ontouchstart="moveRight();" ontouchend="stopMoving();">→</button>
    </div>
    <div class="control-group"><button onclick="destroyBlockDir('up')">破壞 上</button></div>
    <div class="control-group">
      <button onclick="destroyBlockDir('left')">破壞 左</button>
      <button onclick="destroyBlockDir('right')">破壞 右</button>
    </div>
    <div class="control-group"><button onclick="destroyBlockDir('down')">破壞 下</button></div>
  </div>

  <div id="rightControls">
    <div class="control-group"><button onclick="playerAttack()">攻擊</button></div>
    <div id="jumpGroup" class="control-group">
      <button id="jumpBtn" ontouchstart="jump();">跳躍</button>
    </div>
    <div class="control-group"><button onclick="placeBlockDir('up')">放置 上</button></div>
    <div class="control-group">
      <button onclick="placeBlockDir('left')">放置 左</button>
      <button onclick="placeBlockDir('right')">放置 右</button>
    </div>
    <div class="control-group"><button onclick="placeBlockDir('down')">放置 下</button></div>
  </div>

  <div id="deathScreen">
    <div>你死了</div>
    <button onclick="restartGame();">重新開始</button>
  </div>

  <div id="craftingScreen">
    <h2>合成介面</h2>
    <div id="creativeClear" style="display:none; margin-bottom:10px;">
        <button onclick="clearAllItems();" style="background-color:red; color:white;">清除所有物品</button>
    </div>
    <div id="craftingOptions"></div>
    <button class="closeBtn" onclick="closeCrafting()">關閉</button>
  </div>

  <div id="smeltingScreen">
    <h2>熔煉介面</h2>
    <div id="smeltingOptions"></div>
    <button class="closeBtn" onclick="closeSmelting()">關閉</button>
  </div>

  <script>
    document.addEventListener("gesturestart", e => e.preventDefault());
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    /* —— 參數 —— */
    const tileSize = 40;
    const worldCols = 100; // 更新世界大小
    const worldRows = 100;
    const groundLevel = 20;
    const bedrockStart = 95;
    const gravity = 0.5, moveSpeed = 4, jumpVelocity = -12;

    let player = {
      x: 0, y: 0, width: tileSize, height: tileSize,
      vx: 0, vy: 0, onGround: false, health: 10,
      fallStartY: null, toolLevel: -1, injured: false,
      waterStartTime: null, lastWaterDamageTime: null,
      spawnX: 0, spawnY: 0
    };

    let worldData = [], entities = [], projectiles = [];
    let inventory = {}, itemInventory = {};
    let gameMode = "adventure";
    let isNoclip = false;
    let lastJumpTime = 0, lastUpTime = 0, lastDownTime = 0;
    let selectedBlock = null;
    let gameOver = false;
    let worldExists = false;

    const collectibleTypes = ["grass", "wood", "stone", "iron", "gold", "diamond", "coal", "water", "lava", "wool"];
    const recipes = [
      { name: "木劍", materials: {"wood": 2}, isTool: true, toolLevel: 1 },
      { name: "木鎬", materials: {"wood": 3}, isTool: true, toolLevel: 0 },
      { name: "石劍", materials: {"stone": 2}, isTool: true, toolLevel: 1 },
      { name: "石鎬", materials: {"stone": 3}, isTool: true, toolLevel: 1 },
      { name: "鐵劍", materials: {"iron": 2}, isTool: true, toolLevel: 2 },
      { name: "鐵鎬", materials: {"iron": 3}, isTool: true, toolLevel: 2 },
      { name: "鑽石劍", materials: {"diamond": 2}, isTool: true, toolLevel: 3 },
      { name: "鑽石鎬", materials: {"diamond": 3}, isTool: true, toolLevel: 3 },
      { name: "火把", materials: {"coal": 1, "wood": 1}, isTool: false },
      { name: "鐵桶", materials: {"iron": 3}, isTool: true },
      { name: "熔爐", materials: {"stone": 4}, isTool: false },
      { name: "床", materials: {"wool": 2, "wood": 2}, isTool: false } // 新增床
    ];

    const smeltingRecipes = [
      { name: "鐵錠", input: { "iron": 1 }, fuel: { "coal": 1 }, time: 3000 },
      { name: "黃金錠", input: { "gold": 1 }, fuel: { "coal": 1 }, time: 3000 },
      { name: "熟豬肉", input: { "生豬": 1 }, fuel: { "coal": 1 }, time: 3000 }
    ];

    let startTime = performance.now(), dayTime = 0;
    function updateBackground() {
      const elapsed = performance.now() - startTime;
      dayTime = (elapsed % 360000) / 360000 * 2 * Math.PI;
      let intensity = (Math.sin(dayTime) + 1) / 2;
      const r = Math.floor(20 + intensity * (135 - 20));
      const g = Math.floor(20 + intensity * (206 - 20));
      const b = Math.floor(40 + intensity * (235 - 40));
      document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
    }
    function isNight() { return (Math.sin(dayTime) + 1) / 2 < 0.5; }

    /* —— 世界生成 —— */
    function generateWorld() {
      worldData = [];
      for (let row = 0; row < worldRows; row++) {
        for (let col = 0; col < worldCols; col++) {
          let x = col * tileSize, y = row * tileSize;
          if (row === groundLevel) {
            worldData.push({ x: x, y: y, type: "grass", color: "#00FF00" });
            if (Math.random() < 0.1) {
                worldData.push({ x: x, y: y - tileSize, type: "wood", color: "#8B4513" });
                worldData.push({ x: x, y: y - 2*tileSize, type: "leaf", color: "#228B22" });
            }
          } else if (row > groundLevel && row < bedrockStart) {
            let r = Math.random();
            if (r < 0.1) worldData.push({ x: x, y: y, type: "iron", color: "#FFF8E1" });
            else if (r < 0.15) worldData.push({ x: x, y: y, type: "coal", color: "#2F4F4F" });
            else worldData.push({ x: x, y: y, type: "stone", color: "#808080" });
          } else if (row >= bedrockStart) {
            worldData.push({ x: x, y: y, type: "bedrock", color: "#3B3B3B" });
          }
        }
      }
      worldExists = true;
    }

    function findSpawnPoint() {
      return { x: tileSize * 2, y: (groundLevel - 1) * tileSize };
    }

    let cameraX = 0, cameraY = 0;
    function updateCamera() {
      cameraX = player.x - canvas.width / 2;
      cameraY = player.y - canvas.height / 2;
    }

    function drawSunMoon() {
      const intensity = (Math.sin(dayTime) + 1) / 2;
      const radius = 40, orbitRadius = 200;
      let offset = dayTime - Math.PI / 2;
      const x = canvas.width / 2 + orbitRadius * Math.cos(offset), y = canvas.height * 0.2 + orbitRadius * Math.sin(offset);
      ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
      ctx.fillStyle = intensity >= 0.5 ? "yellow" : "white"; ctx.fill();
    }

    function drawWorld() {
      for (const block of worldData) {
        ctx.fillStyle = block.color;
        ctx.fillRect(block.x - cameraX, block.y - cameraY, tileSize, tileSize);
      }
    }

    function drawPlayer() {
      ctx.fillStyle = (player.injured && gameMode !== "creative") ? "red" : "#0000FF";
      if (isNoclip) ctx.globalAlpha = 0.5;
      ctx.fillRect(player.x - cameraX, player.y - cameraY, player.width, player.height);
      ctx.globalAlpha = 1.0;
    }

    function updatePhysics() {
      if (isNoclip) {
        // 穿牆模式：無重力，無碰撞
        return; 
      }
      
      let newX = player.x + (moveDirection || 0) * moveSpeed;
      let horizontalCollision = false;
      for (const block of worldData) {
        if (!["grass", "stone", "wood", "iron", "gold", "diamond", "coal", "bedrock"].includes(block.type)) continue;
        if (rectIntersect(newX, player.y, player.width, player.height, block.x, block.y, tileSize, tileSize)) {
          horizontalCollision = true; break;
        }
      }
      if (!horizontalCollision) player.x = newX;

      player.vy += gravity;
      let newY = player.y + player.vy, verticalCollision = false;
      for (const block of worldData) {
        if (!["grass", "stone", "wood", "iron", "gold", "diamond", "coal", "bedrock"].includes(block.type)) continue;
        if (rectIntersect(player.x, newY, player.width, player.height, block.x, block.y, tileSize, tileSize)) {
          verticalCollision = true;
          if (player.vy > 0) { newY = block.y - player.height; player.onGround = true; player.vy = 0; }
          else if (player.vy < 0) { newY = block.y + tileSize; player.vy = 0; }
          break;
        }
      }
      player.y = newY;
      if (!verticalCollision) player.onGround = false;

      // 掉落傷害 (只限探險/和平模式)
      if (gameMode !== "creative") {
        if (player.onGround && player.fallStartY !== null) {
          let fallDist = (player.y - player.fallStartY) / tileSize;
          if (fallDist > 3) player.health -= Math.floor(fallDist) - 3;
          player.fallStartY = null;
        } else if (!player.onGround && player.fallStartY === null) {
          player.fallStartY = player.y;
        }
        
        if (player.y > (bedrockStart + 2) * tileSize) player.health -= 1; // 虛空傷害
      }
    }

    /* —— 生物系統 —— */
    function spawnMobs() {
      if (gameMode === "peaceful" || gameMode === "creative") {
          // 只生豬同羊
          if (entities.length < 5 && Math.random() < 0.01) {
              let type = Math.random() < 0.5 ? "pig" : "sheep";
              if (type === "sheep" && entities.some(e => e.type === "sheep")) return; // 每次最多一隻羊
              entities.push({
                x: player.x + (Math.random()*400-200), y: (groundLevel-1)*tileSize,
                width: tileSize, height: tileSize, type: type, hp: 3, vy: 0, vx: (Math.random()-0.5)
              });
          }
          return;
      }
      // 探險模式生怪
      if (isNight() && entities.length < 5 && Math.random() < 0.005) {
        entities.push({
          x: player.x + 500, y: (groundLevel-1)*tileSize, width: tileSize, height: tileSize,
          type: "zombie", hp: 10, vy: 0, lastAttackTime: 0
        });
      }
    }

    function updateEntities() {
      for (let i = entities.length - 1; i >= 0; i--) {
        let m = entities[i];
        m.vy += gravity;
        m.y += m.vy;
        m.x += (m.vx || 0);
        for(let b of worldData) {
            if(rectIntersect(m.x, m.y, m.width, m.height, b.x, b.y, tileSize, tileSize)) {
                m.y = b.y - m.height; m.vy = 0; break;
            }
        }
        // 攻擊玩家 (創造模式免疫)
        if (gameMode !== "creative" && m.type === "zombie") {
            if (rectIntersect(m.x, m.y, m.width, m.height, player.x, player.y, player.width, player.height)) {
                if (Date.now() - m.lastAttackTime > 1000) { player.health -= 1; m.lastAttackTime = Date.now(); player.injured = true; setTimeout(()=>player.injured=false, 500); }
            }
        }
        if (m.hp <= 0) {
            if (m.type === "pig") addToItemInventory("生豬", 1);
            if (m.type === "sheep") addToInventory("wool", 1);
            entities.splice(i, 1);
        }
      }
    }

    /* —— 介面功能 —— */
    function openCrafting() {
      document.getElementById("craftingOptions").innerHTML = "";
      document.getElementById("creativeClear").style.display = (gameMode === "creative" ? "block" : "none");
      recipes.forEach(r => {
        const btn = document.createElement("button");
        let can = true;
        if (gameMode !== "creative") {
            for (let m in r.materials) if ((inventory[m] || 0) < r.materials[m]) can = false;
        }
        btn.innerText = r.name + (gameMode === "creative" ? "" : "\n(材料不足)");
        btn.disabled = !can;
        btn.style.backgroundColor = getItemColor(r.name);
        btn.onclick = () => {
          if (gameMode !== "creative") {
              for (let m in r.materials) inventory[m] -= r.materials[m];
          }
          if (r.name === "床") addToItemInventory("床", 1);
          else if (r.isTool) { player.toolLevel = Math.max(player.toolLevel, r.toolLevel); addToItemInventory(r.name, 1); }
          else addToItemInventory(r.name, 1);
          updateInventoryUI(); updateItemInventoryUI(); closeCrafting();
        };
        document.getElementById("craftingOptions").appendChild(btn);
      });
      document.getElementById("craftingScreen").style.display = "block";
    }

    function openSmelting() {
      const container = document.getElementById("smeltingOptions");
      container.innerHTML = "";
      smeltingRecipes.forEach(r => {
        const btn = document.createElement("button");
        btn.innerText = r.name;
        btn.onclick = () => {
          if (gameMode === "creative") { addToItemInventory(r.name, 1); }
          else {
            // 扣除材料邏輯省略...
            setTimeout(() => { addToItemInventory(r.name, 1); updateItemInventoryUI(); }, r.time);
          }
          closeSmelting();
        };
        container.appendChild(btn);
      });
      document.getElementById("smeltingScreen").style.display = "block";
    }

    function addToInventory(item, count) { inventory[item] = (inventory[item] || 0) + count; updateInventoryUI(); }
    function addToItemInventory(item, count) { 
        itemInventory[item] = (itemInventory[item] || 0) + count; 
        if(item === "熔爐") document.getElementById("smeltBtn").style.display = "inline-block";
        updateItemInventoryUI(); 
    }

    function updateInventoryUI() {
      const c = document.getElementById("inventoryUI"); c.innerHTML = "";
      for (let i in inventory) {
        if (inventory[i] <= 0) continue;
        const b = document.createElement("button"); b.innerText = i + " x" + inventory[i];
        b.style.backgroundColor = getItemColor(i);
        b.onclick = () => { selectedBlock = i; };
        c.appendChild(b);
      }
    }

    function updateItemInventoryUI() {
      const c = document.getElementById("iteminventory"); c.innerHTML = "";
      for (let i in itemInventory) {
        if (itemInventory[i] <= 0) continue;
        const b = document.createElement("button"); b.innerText = i + " x" + itemInventory[i];
        b.style.backgroundColor = getItemColor(i);
        b.onclick = () => {
            if (i === "床") useBed();
            if (i === "熟豬肉" || i === "生豬") { player.health = Math.min(10, player.health+3); itemInventory[i]--; updateItemInventoryUI(); }
        };
        c.appendChild(b);
      }
    }

    function useBed() {
        if (isNight()) {
            startTime -= 180000; // 快速跳到朝早
            console.log("瞓醒喇，朝早喇！");
        } else {
            player.spawnX = player.x; player.spawnY = player.y;
            console.log("重生點已設置");
        }
    }

    /* —— 創造模式 & 穿牆 —— */
    function toggleNoclip() {
        isNoclip = !isNoclip;
        const group = document.getElementById("jumpGroup");
        if (isNoclip) {
            group.innerHTML = `
                <button ontouchstart="moveUp();">向上</button>
                <button ontouchstart="moveDown();">向下</button>
            `;
        } else {
            group.innerHTML = `<button id="jumpBtn" ontouchstart="jump();">跳躍</button>`;
        }
    }

    function moveUp() { 
        let now = Date.now();
        if (now - lastUpTime < 300) toggleNoclip();
        else if (isNoclip) player.y -= tileSize;
        lastUpTime = now;
    }
    function moveDown() { 
        let now = Date.now();
        if (now - lastDownTime < 300) toggleNoclip();
        else if (isNoclip) player.y += tileSize;
        lastDownTime = now;
    }

    function jump() {
        let now = Date.now();
        if (gameMode === "creative" && now - lastJumpTime < 300) {
            toggleNoclip();
        } else if (player.onGround) {
            player.vy = jumpVelocity;
        }
        lastJumpTime = now;
    }

    /* —— 遊戲流轉 —— */
    function startAdventure() { gameMode = "adventure"; initGame(); }
    function startPeaceful() { gameMode = "peaceful"; initGame(); }
    function startCreative() { gameMode = "creative"; initGame(); }
    
    function initGame() {
      document.getElementById("startScreen").style.display = "none";
      generateWorld();
      let s = findSpawnPoint();
      player.x = s.x; player.y = s.y; player.health = 10;
      gameOver = false;
      document.getElementById("continueBtn").style.display = "inline-block";
      requestAnimationFrame(gameLoop);
    }

    function continueGame() {
        document.getElementById("startScreen").style.display = "none";
        gameOver = false;
        requestAnimationFrame(gameLoop);
    }

    function goToHomePage() { gameOver = true; document.getElementById("startScreen").style.display = "flex"; }
    function restartGame() { worldExists = false; initGame(); document.getElementById("deathScreen").style.display = "none"; }
    function clearAllItems() { inventory = {}; itemInventory = {}; updateInventoryUI(); updateItemInventoryUI(); }

    function gameLoop() {
      if (gameOver) return;
      updateBackground();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSunMoon();
      updatePhysics();
      updateCamera();
      drawWorld();
      spawnMobs();
      updateEntities();
      drawEntities();
      drawPlayer();
      document.getElementById("hpDisplay").innerText = "HP: " + (gameMode === "creative" ? "∞" : player.health);
      if (player.health <= 0 && gameMode !== "creative") { gameOver = true; document.getElementById("deathScreen").style.display = "flex"; }
      else requestAnimationFrame(gameLoop);
    }

    /* —— 工具函式 —— */
    let moveDirection = 0;
    function moveLeft() { moveDirection = -1; }
    function moveRight() { moveDirection = 1; }
    function stopMoving() { moveDirection = 0; }
    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) { return !(x2 >= x1 + w1 || x2 + w2 <= x1 || y2 >= y1 + h1 || y2 + h2 <= y1); }
    function closeCrafting() { document.getElementById("craftingScreen").style.display = "none"; }
    function closeSmelting() { document.getElementById("smeltingScreen").style.display = "none"; }

    function getItemColor(n) {
      const colors = { 
        "wood": "#8B4513", "stone": "#808080", "grass": "#00FF00", "iron": "#FFF8E1", 
        "coal": "#2F4F4F", "wool": "#F8F8FF", "床": "#DCDCDC", "生豬": "#FFC0CB", "熟豬肉": "#D2B48C" 
      };
      return colors[n] || "#fff";
    }

    function destroyBlockDir(dir) {
      let gx = Math.floor(player.x/tileSize), gy = Math.floor(player.y/tileSize);
      if(dir==='up') gy--; if(dir==='down') gy++; if(dir==='left') gx--; if(dir==='right') gx++;
      worldData = worldData.filter(b => {
          if(b.x === gx*tileSize && b.y === gy*tileSize && b.type !== "bedrock") {
              if(collectibleTypes.includes(b.type)) addToInventory(b.type, 1);
              return false;
          }
          return true;
      });
    }

    function placeBlockDir(dir) {
      if(!selectedBlock || inventory[selectedBlock] <= 0) return;
      let gx = Math.floor(player.x/tileSize), gy = Math.floor(player.y/tileSize);
      if(dir==='up') gy--; if(dir==='down') gy++; if(dir==='left') gx--; if(dir==='right') gx++;
      worldData.push({x: gx*tileSize, y: gy*tileSize, type: selectedBlock, color: getItemColor(selectedBlock)});
      if(gameMode !== "creative") inventory[selectedBlock]--;
      updateInventoryUI();
    }

    function playerAttack() {
        entities.forEach(m => {
            if(Math.abs(m.x - player.x) < tileSize*2 && Math.abs(m.y - player.y) < tileSize*2) m.hp -= 2;
        });
    }
    
    function drawEntities() {
      entities.forEach(m => {
        ctx.fillStyle = m.type === "pig" ? "#FFC0CB" : (m.type === "sheep" ? "#F8F8FF" : "#006400");
        ctx.fillRect(m.x - cameraX, m.y - cameraY, m.width, m.height);
      });
    }
  </script>
</body>
</html>

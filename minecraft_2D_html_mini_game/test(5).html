<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minecraft 2D 探險版［策略更新！test(5)］</title>
  <style>
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #7CFC00;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #startScreen h1 { font-size: 60px; margin: 0; color: #000; }
    #startScreen p { margin: 10px 0; color: #000; }
    #startScreen button {
      font-size: 24px; padding: 10px 20px; margin-top: 10px;
      border: none; border-radius: 5px; background-color: #fff; cursor: pointer;
    }
    body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    .top-controls { position: fixed; top: 10px; left: 10px; z-index: 10; }
    .top-controls button { font-size: 16px; padding: 5px 10px; margin-right: 5px; border: none; border-radius: 5px; background-color: #fff; }
    #inventoryUI, #iteminventory {
      position: fixed; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; z-index: 10;
    }
    #inventoryUI { top: 60px; }
    #iteminventory { top: 120px; }
    #inventoryUI button, #iteminventory button {
      width: 50px; height: 50px; border: 2px solid #000; border-radius: 5px; font-size: 12px; cursor: pointer;
    }
    #hpDisplay {
      position: fixed; top: 10px; right: 10px; font-size: 20px;
      background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 5px; z-index: 10;
    }
    #leftControls { position: fixed; bottom: 10px; left: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
    #rightControls { position: fixed; bottom: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .control-group { display: flex; gap: 8px; }
    #leftControls button, #rightControls button { font-size: 18px; padding: 10px; border: none; border-radius: 5px; background-color: #fff; touch-action: none; }
    #deathScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255,0,0,0.9); color: white;
      display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 40px; z-index: 100; display: none;
    }
    #deathScreen button { font-size: 24px; padding: 10px 20px; margin-top: 20px; }
    #craftingScreen, #smeltingScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100; display: none; overflow-y: auto; padding: 20px;
    }
    #craftingScreen { background-color: #D2B48C; }
    #smeltingScreen { background-color: #808080; }
    #craftingOptions, #smeltingOptions { display: flex; flex-wrap: wrap; gap: 10px; }
    .closeBtn { margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="startScreen">
    <div style="position: absolute; top: 5px; left: 5px; font-size:10px; color:#000;">test(5)</div>
    <h1>Minecraft 2D</h1>
    <p style="font-size: 24px;">［策略更新！］</p>
    <button onclick="startGame('adventure');">探險模式</button>
    <button onclick="startGame('peaceful');">和平模式</button>
    <button onclick="startGame('creative');">創造模式</button>
    <button id="continueBtn" style="display:none;" onclick="continueGame();">繼續遊戲</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="top-controls">
    <button onclick="goToHomePage();">主頁面</button>
    <button onclick="openCrafting();">合成</button>
    <button id="smeltBtn" onclick="openSmelting();" style="display:none;">熔煉</button>
  </div>

  <div id="inventoryUI"></div>
  <div id="iteminventory"></div>
  <div id="hpDisplay">HP: 10</div>

  <div id="leftControls">
    <div class="control-group">
      <button ontouchstart="moveLeft();" ontouchend="stopMoving();" onclick="moveLeft()">←</button>
      <button ontouchstart="moveRight();" ontouchend="stopMoving();" onclick="moveRight()">→</button>
    </div>
    <div class="control-group">
      <button onclick="destroyBlockDir('up')">破壞 上</button>
    </div>
    <div class="control-group">
      <button onclick="destroyBlockDir('left')">破壞 左</button>
      <button onclick="destroyBlockDir('right')">破壞 右</button>
    </div>
    <div class="control-group">
      <button onclick="destroyBlockDir('down')">破壞 下</button>
    </div>
  </div>

  <div id="rightControls">
    <button onclick="playerAttack()">攻擊</button>
    <div id="jumpActionArea">
      <button id="jumpBtn" ontouchstart="handleJumpStart();" onclick="handleJumpStart()">跳躍</button>
    </div>
    <div class="control-group">
      <button onclick="placeBlockDir('up')">放置 上</button>
    </div>
    <div class="control-group">
      <button onclick="placeBlockDir('left')">放置 左</button>
      <button onclick="placeBlockDir('right')">放置 右</button>
    </div>
    <button onclick="placeBlockDir('down')">放置 下</button>
  </div>

  <div id="deathScreen">
    <div>你死了</div>
    <button onclick="restartGame();">重新開始</button>
  </div>

  <div id="craftingScreen">
    <h2>合成介面</h2>
    <div id="creativeCraftingTools" style="display:none; margin-bottom:10px;">
      <button onclick="clearAllItems()" style="background:#ff4444; color:white;">清除所有物品</button>
    </div>
    <div id="craftingOptions"></div>
    <button class="closeBtn" onclick="closeCrafting()">關閉</button>
  </div>

  <div id="smeltingScreen">
    <h2>熔煉介面</h2>
    <div id="smeltingOptions"></div>
    <button class="closeBtn" onclick="closeSmelting()">關閉</button>
  </div>

  <script>
    document.addEventListener("gesturestart", e => e.preventDefault());
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    /* —— 核心參數 —— */
    const tileSize = 40;
    const worldCols = 100; // 更新世界大小
    const worldRows = 100;
    const groundLevel = 15;
    const bedrockStart = 95;
    const gravity = 0.5;
    const moveSpeed = 4;
    const jumpVelocity = -12;

    let player = {
      x: 0, y: 0, width: tileSize, height: tileSize,
      vx: 0, vy: 0, onGround: false, health: 10,
      toolLevel: -1, fallStartY: null, spawnX: 0, spawnY: 0
    };

    let gameMode = "adventure";
    let isCreative = false;
    let isNoclip = false;
    let worldData = [], entities = [], projectiles = [], inventory = {}, itemInventory = {};
    let selectedBlock = null, gameOver = false, isRunning = false;
    let lastJumpTap = 0, lastUpTap = 0, lastDownTap = 0;
    let startTime = performance.now(), dayTime = 0;

    const recipes = [
      { name: "木劍", materials: {"wood": 2}, isTool: true, toolLevel: 1 },
      { name: "木鎬", materials: {"wood": 3}, isTool: true, toolLevel: 0 },
      { name: "石劍", materials: {"stone": 2}, isTool: true, toolLevel: 1 },
      { name: "石鎬", materials: {"stone": 3}, isTool: true, toolLevel: 1 },
      { name: "鐵劍", materials: {"iron": 2}, isTool: true, toolLevel: 2 },
      { name: "鐵鎬", materials: {"iron": 3}, isTool: true, toolLevel: 2 },
      { name: "鑽石劍", materials: {"diamond": 2}, isTool: true, toolLevel: 3 },
      { name: "鑽石鎬", materials: {"diamond": 3}, isTool: true, toolLevel: 3 },
      { name: "火把", materials: {"coal": 1, "wood": 1} },
      { name: "鐵桶", materials: {"iron": 3}, isTool: true },
      { name: "熔爐", materials: {"stone": 4} },
      { name: "床", materials: {"羊毛": 2, "wood": 2} }
    ];

    const smeltingRecipes = [
      { name: "鐵錠", input: { "iron": 1 }, fuel: { "coal": 1 }, time: 3000 },
      { name: "黃金錠", input: { "gold": 1 }, fuel: { "coal": 1 }, time: 3000 },
      { name: "熟豬肉", input: { "生豬": 1 }, fuel: { "coal": 1 }, time: 3000 }
    ];

    function generateWorld() {
      worldData = [];
      for (let r = 0; r < worldRows; r++) {
        for (let c = 0; c < worldCols; c++) {
          let x = c * tileSize, y = r * tileSize;
          if (r === groundLevel) {
            worldData.push({ x, y, type: "grass", color: "#00FF00" });
            if (Math.random() < 0.1) {
              worldData.push({ x, y: y-tileSize, type: "wood", color: "#8B4513" });
              worldData.push({ x: x-tileSize, y: y-tileSize, type: "leaf", color: "#228B22" });
              worldData.push({ x: x+tileSize, y: y-tileSize, type: "leaf", color: "#228B22" });
              worldData.push({ x, y: y-2*tileSize, type: "leaf", color: "#228B22" });
            }
          } else if (r > groundLevel && r < bedrockStart) {
            let rand = Math.random();
            if (rand < 0.7) worldData.push({ x, y, type: "stone", color: "#808080" });
            else if (rand < 0.75) worldData.push({ x, y, type: "coal", color: "#2F4F4F" });
            else if (rand < 0.78) worldData.push({ x, y, type: "iron", color: "#FFF8E1" });
          } else if (r >= bedrockStart) {
            worldData.push({ x, y, type: "bedrock", color: "#3B3B3B" });
          }
        }
      }
      player.spawnX = tileSize * 5;
      player.spawnY = (groundLevel - 1) * tileSize;
      player.x = player.spawnX; player.y = player.spawnY;
    }

    function updateBackground() {
      const elapsed = performance.now() - startTime;
      dayTime = (elapsed % 360000) / 360000 * 2 * Math.PI;
      let intensity = (Math.sin(dayTime) + 1) / 2;
      const r = Math.floor(20 + intensity * 115), g = Math.floor(20 + intensity * 186), b = Math.floor(40 + intensity * 195);
      document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
    }

    function startGame(mode) {
      gameMode = mode;
      isCreative = (mode === 'creative');
      isNoclip = false;
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("continueBtn").style.display = "inline-block";
      if (!isRunning) { restartGame(); isRunning = true; }
      updateJumpUI();
    }

    function continueGame() {
      document.getElementById("startScreen").style.display = "none";
    }

    function goToHomePage() {
      document.getElementById("startScreen").style.display = "flex";
    }

    function restartGame() {
      gameOver = false;
      player.health = 10;
      inventory = {}; itemInventory = {};
      entities = []; projectiles = [];
      generateWorld();
      updateInventoryUI(); updateItemInventoryUI();
      document.getElementById("deathScreen").style.display = "none";
      requestAnimationFrame(gameLoop);
    }

    /* —— 創造模式特有功能 —— */
    function handleJumpStart() {
      let now = Date.now();
      if (now - lastJumpTap < 300 && isCreative) {
        isNoclip = !isNoclip;
        updateJumpUI();
      }
      lastJumpTap = now;
      if (!isNoclip) jump();
    }

    function updateJumpUI() {
      const area = document.getElementById("jumpActionArea");
      if (isNoclip) {
        area.innerHTML = `
          <div class="control-group">
            <button ontouchstart="noclipMove(-1)" ontouchend="stopY()" onclick="noclipMove(-1)">上</button>
            <button ontouchstart="noclipMove(1)" ontouchend="stopY()" onclick="noclipMove(1)">下</button>
          </div>`;
      } else {
        area.innerHTML = `<button id="jumpBtn" ontouchstart="handleJumpStart();" onclick="handleJumpStart()">跳躍</button>`;
      }
    }

    function noclipMove(dir) {
      let now = Date.now();
      if (dir === -1) { if (now - lastUpTap < 300) { isNoclip = false; updateJumpUI(); } lastUpTap = now; player.vy = -8; }
      if (dir === 1) { if (now - lastDownTap < 300) { isNoclip = false; updateJumpUI(); } lastDownTap = now; player.vy = 8; }
    }
    function stopY() { player.vy = 0; }

    function clearAllItems() {
      inventory = {}; itemInventory = {};
      updateInventoryUI(); updateItemInventoryUI();
    }

    /* —— 生存與物理 —— */
    function updatePhysics() {
      if (isNoclip) {
        player.x += moveDirection * moveSpeed;
        player.y += player.vy;
        return;
      }
      
      let nextX = player.x + moveDirection * moveSpeed;
      if (!checkCollision(nextX, player.y)) player.x = nextX;

      player.vy += gravity;
      let nextY = player.y + player.vy;
      if (checkCollision(player.x, nextY)) {
        if (player.vy > 0) {
          player.onGround = true;
          if (!isCreative && player.fallStartY !== null) {
            let dist = (player.y - player.fallStartY) / tileSize;
            if (dist > 3) player.health -= Math.floor(dist - 3);
          }
          player.fallStartY = null;
        }
        player.vy = 0;
      } else {
        player.onGround = false;
        if (player.fallStartY === null) player.fallStartY = player.y;
        player.y = nextY;
      }

      if (player.y > bedrockStart * tileSize) player.health -= 10;
    }

    function checkCollision(x, y) {
      return worldData.some(b => 
        !["water", "lava", "火把"].includes(b.type) &&
        rectIntersect(x, y, player.width, player.height, b.x, b.y, tileSize, tileSize)
      );
    }

    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
    }

    /* —— 生物系統 —— */
    function spawnMobs() {
      if (gameMode === "peaceful" || entities.length > 10) return;
      if (Math.random() < 0.005) {
        let type = Math.random() < 0.5 ? "pig" : "sheep";
        if (type === "sheep" && entities.some(e => e.type === "sheep")) return;
        entities.push({
          x: player.x + (Math.random() * 400 - 200), y: player.y - 100,
          width: tileSize, height: tileSize, type: type, hp: 3, vx: 1, vy: 0
        });
      }
      if (!isCreative && (Math.sin(dayTime) < 0) && Math.random() < 0.01) {
        entities.push({
          x: player.x + 400, y: player.y, width: tileSize, height: tileSize,
          type: "zombie", hp: 10, vx: 0, vy: 0, lastAttack: 0
        });
      }
    }

    function updateEntities() {
      for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.vy += gravity;
        if (!checkCollision(e.x, e.y + e.vy)) e.y += e.vy; else e.vy = 0;

        if (e.type === "pig" || e.type === "sheep") {
          if (Math.random() < 0.02) e.vx *= -1;
          if (!checkCollision(e.x + e.vx, e.y)) e.x += e.vx;
        } else if (e.type === "zombie" && !isCreative) {
          let dx = player.x - e.x;
          e.x += dx > 0 ? 0.5 : -0.5;
          if (rectIntersect(e.x, e.y, e.width, e.height, player.x, player.y, player.width, player.height)) {
            if (Date.now() - e.lastAttack > 1000) { player.health -= 1; e.lastAttack = Date.now(); }
          }
        }

        if (e.hp <= 0) {
          if (e.type === "pig") addToItemInventory("生豬", 1);
          if (e.type === "sheep") addToItemInventory("羊毛", 1);
          entities.splice(i, 1);
        }
      }
    }

    /* —— 合成、熔煉與床 —— */
    function openCrafting() {
      document.getElementById("creativeCraftingTools").style.display = isCreative ? "block" : "none";
      const container = document.getElementById("craftingOptions");
      container.innerHTML = "";
      recipes.forEach(r => {
        const btn = document.createElement("button");
        let can = isCreative;
        if (!can) {
          can = true;
          for (let m in r.materials) if ((inventory[m] || 0) < r.materials[m]) can = false;
        }
        btn.innerText = r.name;
        btn.disabled = !can;
        btn.onclick = () => craftItem(r);
        container.appendChild(btn);
      });
      document.getElementById("craftingScreen").style.display = "block";
    }

    function craftItem(r) {
      if (!isCreative) {
        for (let m in r.materials) inventory[m] -= r.materials[m];
      }
      addToItemInventory(r.name, 1);
      updateInventoryUI(); updateItemInventoryUI();
    }

    function openSmelting() {
      const container = document.getElementById("smeltingOptions");
      container.innerHTML = "";
      smeltingRecipes.forEach(r => {
        const btn = document.createElement("button");
        btn.innerText = r.name;
        btn.onclick = () => {
          if (isCreative) { addToItemInventory(r.name, 1); updateItemInventoryUI(); }
          else smeltItem(r);
        };
        container.appendChild(btn);
      });
      document.getElementById("smeltingScreen").style.display = "block";
    }

    function sleep() {
      let intensity = (Math.sin(dayTime) + 1) / 2;
      if (intensity < 0.5) { // 夜晚
        startTime -= 180000; // 跳到朝早
      } else { // 日頭
        player.spawnX = player.x;
        player.spawnY = player.y;
        console.log("重生點已設置");
      }
    }

    /* —— 介面更新 —— */
    function updateInventoryUI() {
      const ui = document.getElementById("inventoryUI");
      ui.innerHTML = "";
      for (let id in inventory) {
        if (inventory[id] <= 0) continue;
        const b = document.createElement("button");
        b.innerText = id + " x" + inventory[id];
        b.onclick = () => selectedBlock = id;
        ui.appendChild(b);
      }
    }

    function updateItemInventoryUI() {
      const ui = document.getElementById("iteminventory");
      ui.innerHTML = "";
      for (let id in itemInventory) {
        if (itemInventory[id] <= 0) continue;
        const b = document.createElement("button");
        b.innerText = id + " x" + itemInventory[id];
        b.onclick = () => {
          if (id === "床") sleep();
          if (id === "熔爐") openSmelting();
        };
        ui.appendChild(b);
      }
      document.getElementById("smeltBtn").style.display = itemInventory["熔爐"] > 0 ? "inline-block" : "none";
    }

    function addToItemInventory(item, count) { itemInventory[item] = (itemInventory[item] || 0) + count; updateItemInventoryUI(); }
    function addToInventory(item, count) { inventory[item] = (inventory[item] || 0) + count; updateInventoryUI(); }

    /* —— 遊戲主迴圈 —— */
    let cameraX = 0, cameraY = 0;
    let moveDirection = 0;

    function gameLoop() {
      if (gameOver) return;
      updateBackground();
      updatePhysics();
      spawnMobs();
      updateEntities();
      
      cameraX = player.x - canvas.width / 2;
      cameraY = player.y - canvas.height / 2;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 繪製世界
      worldData.forEach(b => {
        if (b.x > cameraX - tileSize && b.x < cameraX + canvas.width && b.y > cameraY - tileSize && b.y < cameraY + canvas.height) {
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x - cameraX, b.y - cameraY, tileSize, tileSize);
        }
      });

      // 繪製生物
      entities.forEach(e => {
        ctx.fillStyle = e.type === "sheep" ? "#FFF5EE" : (e.type === "pig" ? "#FFC0CB" : "#006400");
        ctx.fillRect(e.x - cameraX, e.y - cameraY, e.width, e.height);
      });

      // 繪製玩家
      ctx.fillStyle = isCreative ? "#FFD700" : "#0000FF";
      ctx.fillRect(player.x - cameraX, player.y - cameraY, player.width, player.height);

      document.getElementById("hpDisplay").innerText = "HP: " + Math.max(0, player.health);
      if (player.health <= 0 && !isCreative) { gameOver = true; document.getElementById("deathScreen").style.display = "flex"; }
      
      requestAnimationFrame(gameLoop);
    }

    /* —— 控制指令 —— */
    function moveLeft() { moveDirection = -1; }
    function moveRight() { moveDirection = 1; }
    function stopMoving() { moveDirection = 0; }
    function jump() { if (player.onGround) player.vy = jumpVelocity; }

    function destroyBlockDir(dir) {
      let tx = Math.floor((player.x + tileSize / 2) / tileSize);
      let ty = Math.floor((player.y + tileSize / 2) / tileSize);
      if (dir === "up") ty--; if (dir === "down") ty++; if (dir === "left") tx--; if (dir === "right") tx++;
      let idx = worldData.findIndex(b => b.x === tx * tileSize && b.y === ty * tileSize);
      if (idx !== -1) {
        let b = worldData[idx];
        if (b.type !== "bedrock" || isCreative) {
          addToInventory(b.type, 1);
          worldData.splice(idx, 1);
        }
      }
    }

    function placeBlockDir(dir) {
      if (!selectedBlock || inventory[selectedBlock] <= 0) return;
      let tx = Math.floor((player.x + tileSize / 2) / tileSize);
      let ty = Math.floor((player.y + tileSize / 2) / tileSize);
      if (dir === "up") ty--; if (dir === "down") ty++; if (dir === "left") tx--; if (dir === "right") tx++;
      if (!worldData.some(b => b.x === tx * tileSize && b.y === ty * tileSize)) {
        let color = "#fff";
        if (selectedBlock === "grass") color = "#00FF00";
        if (selectedBlock === "stone") color = "#808080";
        if (selectedBlock === "wood") color = "#8B4513";
        worldData.push({ x: tx * tileSize, y: ty * tileSize, type: selectedBlock, color: color });
        if (!isCreative) inventory[selectedBlock]--;
        updateInventoryUI();
      }
    }

    function playerAttack() {
      entities.forEach(e => {
        if (rectIntersect(player.x - 40, player.y - 40, 120, 120, e.x, e.y, e.width, e.height)) e.hp -= 2;
      });
    }

    function closeCrafting() { document.getElementById("craftingScreen").style.display = "none"; }
    function closeSmelting() { document.getElementById("smeltingScreen").style.display = "none"; }

    // 初始化
    generateWorld();
  </script>
</body>
</html>

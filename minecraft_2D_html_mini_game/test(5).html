<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minecraft 2D 探險版［實體與策略更新！］</title>
  <style>
    /* 遊戲開始介面 */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #7CFC00;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #startScreen h1 { font-size: 60px; margin: 0; color: #000; }
    #startScreen p { margin: 10px 0; color: #000; }
    #startScreen button {
      font-size: 20px; padding: 10px 20px; margin-top: 10px;
      border: none; border-radius: 5px; background-color: #fff; cursor: pointer;
    }
    body {
      margin: 0; overflow: hidden; background-color: #87CEEB;
      touch-action: manipulation; user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; }
    .top-controls { position: fixed; top: 10px; left: 10px; z-index: 10; }
    .top-controls button {
      font-size: 16px; padding: 5px 10px; margin-right: 5px;
      border: none; border-radius: 5px; background-color: #fff;
    }
    /* 庫存 UI */
    #inventoryUI, #iteminventory {
      position: fixed; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; z-index: 10;
    }
    #inventoryUI { top: 60px; }
    #iteminventory { top: 120px; }
    #inventoryUI button, #iteminventory button {
      width: 50px; height: 50px; border: 2px solid #000;
      border-radius: 5px; font-size: 12px; cursor: pointer; background-color: #fff;
    }
    #hpDisplay {
      position: fixed; top: 10px; right: 10px; font-size: 20px;
      background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 5px; z-index: 10;
    }
    /* 控制按鈕 */
    #leftControls, #rightControls { position: fixed; bottom: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
    #leftControls { left: 10px; }
    #rightControls { right: 10px; align-items: flex-end; }
    .control-group { display: flex; gap: 8px; }
    button { font-size: 16px; padding: 10px; border: none; border-radius: 5px; background-color: #fff; }

    /* 彈出視窗 */
    #deathScreen, #craftingScreen, #smeltingScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
    }
    #deathScreen { background-color: rgba(255,0,0,0.9); color: white; font-size: 40px; }
    #craftingScreen { background-color: #D2B48C; overflow-y: auto; padding: 20px; display: none; }
    #smeltingScreen { background-color: #808080; overflow-y: auto; padding: 20px; display: none; }
    #craftingOptions, #smeltingOptions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .closeBtn { margin-top: 20px; background-color: #f00; color: #fff; }
  </style>
</head>
<body>

  <div id="startScreen">
    <div style="position: absolute; top: 5px; left: 5px; font-size:10px; color:#000;">test(5) - Fixed</div>
    <h1>Minecraft 2D</h1>
    <p>［實體與策略更新！］</p>
    <button id="continueBtn" onclick="continueGame();" style="display:none; background-color: #FFD700;">繼續遊戲</button>
    <button onclick="startMode('adventure');">探險模式</button>
    <button onclick="startMode('peaceful');">和平模式</button>
    <button onclick="startMode('creative');">創造模式</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="top-controls">
    <button onclick="goToHomePage();">主頁面</button>
    <button onclick="openCrafting();">合成</button>
    <button id="smeltBtn" onclick="openSmelting();" style="display:none;">熔煉</button>
  </div>

  <div id="inventoryUI"></div>
  <div id="iteminventory"></div>
  <div id="hpDisplay">HP: 10</div>

  <div id="leftControls">
    <div class="control-group">
      <button ontouchstart="moveLeft();" ontouchend="stopMoving();">←</button>
      <button ontouchstart="moveRight();" ontouchend="stopMoving();">→</button>
    </div>
    <div class="control-group"><button onclick="destroyBlockDir('up')">破壞 上</button></div>
    <div class="control-group">
      <button onclick="destroyBlockDir('left')">破壞 左</button>
      <button onclick="destroyBlockDir('right')">破壞 右</button>
    </div>
    <div class="control-group"><button onclick="destroyBlockDir('down')">破壞 下</button></div>
  </div>

  <div id="rightControls">
    <div class="control-group"><button onclick="playerAttack()">攻擊</button></div>
    <div id="jumpControlGroup" class="control-group">
      <button id="jumpBtn" ontouchstart="handleJumpStart();">跳躍</button>
    </div>
    <div class="control-group"><button onclick="placeBlockDir('up')">放置 上</button></div>
    <div class="control-group">
      <button onclick="placeBlockDir('left')">放置 左</button>
      <button onclick="placeBlockDir('right')">放置 右</button>
    </div>
    <div class="control-group"><button onclick="placeBlockDir('down')">放置 下</button></div>
  </div>

  <div id="deathScreen">
    <div>你死了</div>
    <button onclick="restartGame();">重新開始</button>
  </div>

  <div id="craftingScreen">
    <h2>合成介面</h2>
    <div id="craftingOptions"></div>
    <button id="clearItemsBtn" style="display:none; background-color: #ff4444; color: white;" onclick="clearInventory()">清除所有物品</button>
    <button class="closeBtn" onclick="closeCrafting()">關閉</button>
  </div>

  <div id="smeltingScreen">
    <h2>熔煉介面</h2>
    <div id="smeltingOptions"></div>
    <button class="closeBtn" onclick="closeSmelting()">關閉</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    /* —— 參數 —— */
    const tileSize = 40;
    const worldCols = 80;
    const worldRows = 80;
    const groundLevel = 15;
    const mineralStart = 30;
    const lavaStart = 60;
    const bedrockStart = 75;
    const gravity = 0.5, moveSpeed = 4, jumpVelocity = -12;

    let gameMode = "adventure";
    let isGameRunning = false;
    let gameOver = false;
    let worldData = [], entities = [], projectiles = [];
    let inventory = {}, itemInventory = {};
    let selectedBlock = null;
    let cameraX = 0, cameraY = 0;
    let startTime = performance.now(), dayTime = 0;
    let moveDirection = 0;

    let player = {
      x: 0, y: 0, width: tileSize, height: tileSize,
      vx: 0, vy: 0, onGround: false, health: 10,
      toolLevel: -1, injured: false, injuredTime: 0,
      isNoClip: false, lastJumpTime: 0, spawnPoint: null,
      moveUp: false, moveDown: false,
      lastUpPressTime: 0, lastDownPressTime: 0
    };

    const oreTypes = [
      { type: "coal", color: "#2F4F4F", req: 0 },
      { type: "iron", color: "#FFF8E1", req: 1 },
      { type: "gold", color: "#FFD700", req: 1 },
      { type: "diamond", color: "#00FFFF", req: 2 }
    ];

    const recipes = [
      { name: "木劍", materials: {"wood": 2}, isTool: true, toolLevel: 1, type: "sword" },
      { name: "木鎬", materials: {"wood": 3}, isTool: true, toolLevel: 0, type: "pickaxe" },
      { name: "石劍", materials: {"stone": 2}, isTool: true, toolLevel: 1, type: "sword" },
      { name: "石鎬", materials: {"stone": 3}, isTool: true, toolLevel: 1, type: "pickaxe" },
      { name: "鐵劍", materials: {"iron": 2}, isTool: true, toolLevel: 2, type: "sword" },
      { name: "鐵鎬", materials: {"iron": 3}, isTool: true, toolLevel: 2, type: "pickaxe" },
      { name: "鑽石劍", materials: {"diamond": 2}, isTool: true, toolLevel: 3, type: "sword" },
      { name: "鑽石鎬", materials: {"diamond": 3}, isTool: true, toolLevel: 3, type: "pickaxe" },
      { name: "火把", materials: {"coal": 1, "wood": 1}, isTool: false },
      { name: "鐵桶", materials: {"iron": 3}, isTool: true },
      { name: "熔爐", materials: {"stone": 4}, isTool: false },
      { name: "床", materials: {"羊毛": 2, "wood": 2}, isTool: false }
    ];

    const smeltingRecipes = [
      { name: "鐵錠", input: { "iron": 1 }, fuel: { "coal": 1 }, time: 3000 },
      { name: "黃金錠", input: { "gold": 1 }, fuel: { "coal": 1 }, time: 3000 },
      { name: "熟豬肉", input: { "生豬": 1 }, fuel: { "coal": 1 }, time: 2000 }
    ];

    /* —— 初始化與重設 —— */
    function startMode(mode) {
      gameMode = mode;
      resetGameData();
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("continueBtn").style.display = "inline-block";
      isGameRunning = true;
      requestAnimationFrame(gameLoop);
    }

    function resetGameData() {
      worldData = [];
      entities = [];
      projectiles = [];
      inventory = {};
      itemInventory = {};
      selectedBlock = null;
      player.health = 10;
      player.toolLevel = (gameMode === "creative") ? 10 : -1;
      player.isNoClip = false;
      player.spawnPoint = null;
      generateWorld();
      const spawn = findSpawnPoint();
      player.x = spawn.x;
      player.y = spawn.y;
      updateInventoryUI();
      updateItemInventoryUI();
      updateSmeltButtonVisibility();
    }

    function generateWorld() {
      for (let row = 0; row < worldRows; row++) {
        for (let col = 0; col < worldCols; col++) {
          let x = col * tileSize, y = row * tileSize;
          if (row < groundLevel) continue;
          if (row === groundLevel) {
            worldData.push({ x, y, type: "grass", color: "#00FF00" });
            if (Math.random() < 0.1) {
              worldData.push({ x, y: y-tileSize, type: "wood", color: "#8B4513" });
              worldData.push({ x: x-tileSize, y: y-tileSize, type: "leaf", color: "#228B22" });
              worldData.push({ x: x+tileSize, y: y-tileSize, type: "leaf", color: "#228B22" });
              worldData.push({ x, y: y-2*tileSize, type: "leaf", color: "#228B22" });
            }
          } else if (row >= bedrockStart) {
            worldData.push({ x, y, type: "bedrock", color: "#3B3B3B" });
          } else {
            let r = Math.random();
            if (row < mineralStart) {
              if (r > 0.1) worldData.push({ x, y, type: "stone", color: "#808080" });
            } else if (row < lavaStart) {
              if (r < 0.05) {
                let ore = oreTypes[Math.floor(Math.random() * 3)];
                worldData.push({ x, y, type: ore.type, color: ore.color });
              } else if (r > 0.15) worldData.push({ x, y, type: "stone", color: "#808080" });
            } else {
              if (r < 0.1) worldData.push({ x, y, type: "lava", color: "#FF4500" });
              else if (r < 0.15) worldData.push({ x, y, type: "diamond", color: "#00FFFF" });
              else worldData.push({ x, y, type: "deepStone", color: "#505050" });
            }
          }
        }
      }
    }

    function findSpawnPoint() {
      let grass = worldData.filter(b => b.type === "grass");
      let b = grass[Math.floor(Math.random() * grass.length)];
      return { x: b.x, y: b.y - tileSize };
    }

    /* —— 核心循環 —— */
    function gameLoop(time) {
      if (!isGameRunning) return;
      updateBackground(time);
      updatePhysics();
      updateEntities();
      updateProjectiles();
      draw();
      spawnMobs();
      requestAnimationFrame(gameLoop);
    }

    function updateBackground(time) {
      const elapsed = time - startTime;
      dayTime = (elapsed % 360000) / 360000 * 2 * Math.PI;
      let intensity = (Math.sin(dayTime) + 1) / 2;
      const r = Math.floor(20 + intensity * 115);
      const g = Math.floor(20 + intensity * 186);
      const b = Math.floor(40 + intensity * 195);
      document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
    }

    function isNight() { return ((Math.sin(dayTime) + 1) / 2) < 0.3; }

    /* —— 物理 —— */
    function updatePhysics() {
      if (player.isNoClip) {
        player.x += moveDirection * moveSpeed * 2;
        if (player.moveUp) player.y -= moveSpeed * 2;
        if (player.moveDown) player.y += moveSpeed * 2;
        cameraX = player.x - canvas.width / 2;
        cameraY = player.y - canvas.height / 2;
        return;
      }

      let newX = player.x + moveDirection * moveSpeed;
      if (!checkCollision(newX, player.y)) player.x = newX;

      player.vy += gravity;
      let newY = player.y + player.vy;
      if (checkCollision(player.x, newY)) {
        if (player.vy > 0) player.onGround = true;
        player.vy = 0;
      } else {
        player.y = newY;
        player.onGround = false;
      }

      // 液體檢查
      if (isAtLiquid(player.x, player.y, "water")) player.vy *= 0.8;
      if (isAtLiquid(player.x, player.y, "lava") && Math.random() < 0.05 && gameMode !== "creative") player.health -= 1;

      cameraX = player.x - canvas.width / 2;
      cameraY = player.y - canvas.height / 2;

      if (player.health <= 0) showDeathScreen();
    }

    function checkCollision(x, y) {
      return worldData.some(b => 
        !["water", "lava", "火把"].includes(b.type) &&
        rectIntersect(x, y, player.width, player.height, b.x, b.y, tileSize, tileSize)
      );
    }

    function isAtLiquid(x, y, type) {
      return worldData.some(b => b.type === type && rectIntersect(x, y, player.width, player.height, b.x, b.y, tileSize, tileSize));
    }

    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    /* —— 實體 AI —— */
    function spawnMobs() {
      if (gameMode === "peaceful") return;
      if (entities.length < 10 && Math.random() < 0.01) {
        let type = "pig";
        if (isNight() || gameMode === "adventure") {
          let r = Math.random();
          if (r < 0.4) type = "zombie";
          else if (r < 0.7) type = "skeleton";
          else if (r < 0.9) type = "creeper";
          else type = "spider";
        }
        if (gameMode === "creative" && Math.random() > 0.1) type = "sheep";
        
        entities.push({
          x: player.x + (Math.random() > 0.5 ? 400 : -400),
          y: player.y - 200,
          width: tileSize, height: tileSize,
          type: type, hp: type === "pig" ? 5 : 10, vy: 0,
          lastAtk: 0, lastArrow: 0, explosionStart: null
        });
      }
    }

    function updateEntities() {
      entities.forEach((m, i) => {
        // AI 邏輯
        let dx = player.x - m.x;
        if (["zombie", "spider", "creeper"].includes(m.type)) {
          m.x += dx > 0 ? 1 : -1;
        } else if (m.type === "skeleton") {
          if (Math.abs(dx) > 200) m.x += dx > 0 ? 1 : -1;
          else if (Math.abs(dx) < 150) m.x += dx > 0 ? -1 : 1;
          // 射箭
          if (Date.now() - m.lastArrow > 2000 && Math.abs(dx) < 300) {
            projectiles.push({ x: m.x, y: m.y, vx: dx > 0 ? 5 : -5, vy: -2, width: 10, height: 5 });
            m.lastArrow = Date.now();
          }
        } else if (m.type === "creeper" && Math.abs(dx) < 50) {
            if (!m.explosionStart) m.explosionStart = Date.now();
            if (Date.now() - m.explosionStart > 1500) {
                if (Math.abs(player.x - m.x) < 100) player.health -= 4;
                entities.splice(i, 1);
                return;
            }
        }

        // 攻擊玩家
        if (rectIntersect(m.x, m.y, tileSize, tileSize, player.x, player.y, player.width, player.height)) {
          if (Date.now() - m.lastAtk > 1000 && gameMode !== "creative") {
            player.health -= 1;
            m.lastAtk = Date.now();
            player.injured = true;
            player.injuredTime = Date.now();
          }
        }

        // 物理
        m.vy += gravity;
        let nY = m.y + m.vy;
        if (worldData.some(b => !["water", "lava"].includes(b.type) && rectIntersect(m.x, nY, tileSize, tileSize, b.x, b.y, tileSize, tileSize))) {
          m.vy = 0;
        } else { m.y = nY; }

        if (m.hp <= 0) {
          if (m.type === "pig") addToItemInventory("生豬", 1);
          if (m.type === "sheep") addToInventory("羊毛", 1);
          entities.splice(i, 1);
        }
      });
    }

    function updateProjectiles() {
      projectiles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1;
        if (rectIntersect(p.x, p.y, p.width, p.height, player.x, player.y, player.width, player.height)) {
          if (gameMode !== "creative") player.health -= 1;
          projectiles.splice(i, 1);
        }
        if (worldData.some(b => !["water","lava"].includes(b.type) && rectIntersect(p.x, p.y, p.width, p.height, b.x, b.y, tileSize, tileSize))) {
          projectiles.splice(i, 1);
        }
      });
    }

    /* —— 繪製 —— */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 太陽/月亮
      const intensity = (Math.sin(dayTime) + 1) / 2;
      ctx.fillStyle = intensity > 0.3 ? "yellow" : "white";
      ctx.beginPath();
      ctx.arc(canvas.width/2 + Math.cos(dayTime)*200, 100 + Math.sin(dayTime)*50, 30, 0, Math.PI*2);
      ctx.fill();

      // 世界
      worldData.forEach(b => {
        if (Math.abs(b.x - player.x) > canvas.width || Math.abs(b.y - player.y) > canvas.height) return;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x - cameraX, b.y - cameraY, tileSize, tileSize);
        if (b.type === "火把") {
            ctx.fillStyle = "rgba(255,165,0,0.2)";
            ctx.fillRect(b.x - cameraX - tileSize*2, b.y - cameraY - tileSize*2, tileSize*5, tileSize*5);
        }
      });

      // 實體
      entities.forEach(m => {
        ctx.fillStyle = (m.type === "zombie") ? "#006400" : (m.type === "pig") ? "#FFC0CB" : (m.type === "creeper") ? "#1E8A1E" : (m.type === "skeleton") ? "#D3D3D3" : "#F8F8FF";
        if (m.explosionStart && (Math.floor(Date.now()/100)%2==0)) ctx.fillStyle = "white";
        ctx.fillRect(m.x - cameraX, m.y - cameraY, m.width, m.height);
      });

      // 彈幕
      projectiles.forEach(p => { ctx.fillStyle = "black"; ctx.fillRect(p.x - cameraX, p.y - cameraY, p.width, p.height); });

      // 玩家
      ctx.globalAlpha = player.isNoClip ? 0.5 : 1.0;
      ctx.fillStyle = (player.injured && Date.now() - player.injuredTime < 500) ? "red" : "#0000FF";
      ctx.fillRect(player.x - cameraX, player.y - cameraY, player.width, player.height);
      ctx.globalAlpha = 1.0;

      document.getElementById("hpDisplay").innerText = "HP: " + Math.ceil(player.health);
    }

    /* —— 交互 —— */
    function moveLeft() { moveDirection = -1; }
    function moveRight() { moveDirection = 1; }
    function stopMoving() { moveDirection = 0; }

    function handleJumpStart() {
      const now = Date.now();
      if (gameMode === "creative" && now - player.lastJumpTime < 300) { toggleNoClip(); return; }
      player.lastJumpTime = now;
      if (player.onGround || isAtLiquid(player.x, player.y, "water")) player.vy = jumpVelocity;
    }

    function toggleNoClip() {
      player.isNoClip = !player.isNoClip;
      const group = document.getElementById("jumpControlGroup");
      if (player.isNoClip) {
        group.innerHTML = `<button ontouchstart="player.moveUp=true;" ontouchend="player.moveUp=false;">上</button>
                           <button ontouchstart="player.moveDown=true;" ontouchend="player.moveDown=false;">下</button>
                           <button onclick="toggleNoClip()">落</button>`;
      } else {
        group.innerHTML = `<button id="jumpBtn" ontouchstart="handleJumpStart()">跳躍</button>`;
      }
    }

    function destroyBlockDir(dir) {
      let gx = Math.floor((player.x + tileSize/2)/tileSize);
      let gy = Math.floor((player.y + tileSize/2)/tileSize);
      if (dir === 'up') gy--; if (dir === 'down') gy++; if (dir === 'left') gx--; if (dir === 'right') gx++;
      
      let idx = worldData.findIndex(b => b.x === gx*tileSize && b.y === gy*tileSize);
      if (idx !== -1) {
        let b = worldData[idx];
        if (b.type === "bedrock" && gameMode !== "creative") return;
        // 工具檢查
        const reqs = {"iron": 2, "gold": 2, "diamond": 3, "stone": 1};
        if (gameMode !== "creative" && reqs[b.type] && player.toolLevel < reqs[b.type]) return;
        
        addToInventory(b.type, 1);
        worldData.splice(idx, 1);
      }
    }

    function placeBlockDir(dir) {
      if (!selectedBlock || (gameMode !== "creative" && inventory[selectedBlock] <= 0)) return;
      let gx = Math.floor((player.x + tileSize/2)/tileSize);
      let gy = Math.floor((player.y + tileSize/2)/tileSize);
      if (dir === 'up') gy--; if (dir === 'down') gy++; if (dir === 'left') gx--; if (dir === 'right') gx++;
      
      if (!worldData.some(b => b.x === gx*tileSize && b.y === gy*tileSize)) {
        worldData.push({ x: gx*tileSize, y: gy*tileSize, type: selectedBlock, color: getItemColor(selectedBlock) });
        if (gameMode !== "creative") { inventory[selectedBlock]--; updateInventoryUI(); }
      }
    }

    function playerAttack() {
      entities.forEach(m => {
        if (Math.abs(m.x - player.x) < 80 && Math.abs(m.y - player.y) < 80) m.hp -= (2 + player.toolLevel);
      });
    }

    /* —— 合成與熔煉 —— */
    function openCrafting() {
      const container = document.getElementById("craftingOptions");
      container.innerHTML = "";
      recipes.forEach(r => {
        const btn = document.createElement("button");
        btn.style.backgroundColor = getItemColor(r.name);
        btn.innerText = r.name;
        btn.onclick = () => {
          let can = true;
          for (let m in r.materials) if ((inventory[m]||0) < r.materials[m]) can = false;
          if (can || gameMode === "creative") {
            if (gameMode !== "creative") { for (let m in r.materials) inventory[m] -= r.materials[m]; }
            addToItemInventory(r.name, 1);
            if (r.isTool) player.toolLevel = Math.max(player.toolLevel, r.toolLevel);
            updateInventoryUI(); updateItemInventoryUI();
          }
        };
        container.appendChild(btn);
      });
      document.getElementById("craftingScreen").style.display = "flex";
    }

    function openSmelting() {
      const container = document.getElementById("smeltingOptions");
      container.innerHTML = "";
      smeltingRecipes.forEach(r => {
        const btn = document.createElement("button");
        btn.innerText = r.name;
        btn.onclick = () => {
            let can = true;
            for (let m in r.input) if ((inventory[m]||0) < r.input[m]) can = false;
            for (let f in r.fuel) if ((inventory[f]||0) < r.fuel[f]) can = false;
            if (can) {
                for (let m in r.input) inventory[m]--;
                for (let f in r.fuel) inventory[f]--;
                setTimeout(() => { addToItemInventory(r.name, 1); updateItemInventoryUI(); }, r.time);
                closeSmelting();
            }
        };
        container.appendChild(btn);
      });
      document.getElementById("smeltingScreen").style.display = "flex";
    }

    /* —— 工具 —— */
    function addToInventory(item, n) { inventory[item] = (inventory[item]||0) + n; updateInventoryUI(); }
    function addToItemInventory(item, n) { itemInventory[item] = (itemInventory[item]||0) + n; updateItemInventoryUI(); updateSmeltButtonVisibility(); }
    
    function updateInventoryUI() {
      const c = document.getElementById("inventoryUI"); c.innerHTML = "";
      for (let i in inventory) {
        if (inventory[i]<=0) continue;
        const b = document.createElement("button"); b.innerText = i + " x" + inventory[i];
        b.style.backgroundColor = getItemColor(i);
        b.onclick = () => { selectedBlock = i; };
        c.appendChild(b);
      }
    }
    function updateItemInventoryUI() {
      const c = document.getElementById("iteminventory"); c.innerHTML = "";
      for (let i in itemInventory) {
        if (itemInventory[i]<=0) continue;
        const b = document.createElement("button"); b.innerText = i + " x" + itemInventory[i];
        b.style.backgroundColor = getItemColor(i);
        b.onclick = () => {
            if (i === "熔爐") openSmelting();
            if (i === "火把") selectedBlock = "火把";
            if (i === "熟豬肉" || i === "生豬") {
                player.health = Math.min(10, player.health + 3);
                itemInventory[i]--; updateItemInventoryUI();
            }
        };
        c.appendChild(b);
      }
    }

    function getItemColor(n) {
      const colors = { "wood":"#8B4513", "stone":"#808080", "grass":"#00FF00", "羊毛":"#F8F8FF", "床":"#DCDCDC", "iron":"#FFF8E1", "gold":"#FFD700", "diamond":"#00FFFF", "coal":"#2F4F4F", "water":"#00BFFF", "lava":"#FF4500", "火把":"#F5DEB3" };
      return colors[n] || "#fff";
    }

    function updateSmeltButtonVisibility() { document.getElementById("smeltBtn").style.display = (itemInventory["熔爐"] > 0) ? "inline-block" : "none"; }
    function closeCrafting() { document.getElementById("craftingScreen").style.display = "none"; }
    function closeSmelting() { document.getElementById("smeltingScreen").style.display = "none"; }
    function showDeathScreen() { isGameRunning = false; document.getElementById("deathScreen").style.display = "flex"; }
    function restartGame() { document.getElementById("deathScreen").style.display = "none"; resetGameData(); isGameRunning = true; }
    function goToHomePage() { isGameRunning = false; document.getElementById("startScreen").style.display = "flex"; }
    function continueGame() { document.getElementById("startScreen").style.display = "none"; isGameRunning = true; }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minecraft 2D 探險版［策略更新！］</title>
  <style>
    /* 介面樣式 */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #7CFC00;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #startScreen h1 { font-size: 72px; margin: 0; color: #000; }
    #startScreen button { font-size: 24px; padding: 10px 20px; margin-top: 10px; border: none; border-radius: 5px; background-color: #fff; cursor: pointer; }
    
    body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    
    .top-controls { position: fixed; top: 10px; left: 10px; z-index: 10; }
    .top-controls button { font-size: 16px; padding: 5px 10px; margin-right: 5px; border: none; border-radius: 5px; background-color: #fff; }
    
    #inventoryUI, #iteminventory { position: fixed; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; }
    #inventoryUI { top: 60px; }
    #iteminventory { top: 120px; }
    #inventoryUI button, #iteminventory button { width: 50px; height: 50px; border: 2px solid #000; border-radius: 5px; font-size: 12px; cursor: pointer; }
    
    #hpDisplay { position: fixed; top: 10px; right: 10px; font-size: 20px; background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 5px; z-index: 10; }
    
    #leftControls { position: fixed; bottom: 10px; left: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
    #rightControls { position: fixed; bottom: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .control-group { display: flex; gap: 8px; }
    #leftControls button, #rightControls button { font-size: 18px; padding: 10px; border: none; border-radius: 5px; background-color: #fff; min-width: 60px; }
    
    #deathScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255,0,0,0.9); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 40px; z-index: 100; }
    #craftingScreen, #smeltingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; overflow-y: auto; padding: 20px; }
    #craftingScreen { background-color: #D2B48C; }
    #smeltingScreen { background-color: #808080; }
    #craftingOptions, #smeltingOptions { display: flex; flex-wrap: wrap; gap: 10px; }
    .closeBtn { margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="startScreen">
    <div style="position: absolute; top: 5px; left: 5px; font-size:10px; color:#000;">test(5)</div>
    <h1>Minecraft 2D</h1>
    <p style="font-size: 24px;">［策略更新！整合版］</p>
    <button id="continueBtn" onclick="continueGame();" style="display:none; background-color: #FFD700;">繼續遊戲</button>
    <button onclick="startAdventure();">探險模式</button>
    <button onclick="startPeaceful();">和平模式</button>
    <button onclick="startCreative();">創造模式</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="top-controls">
    <button onclick="goToHomePage();">主頁面</button>
    <button onclick="openCrafting();">合成</button>
    <button id="smeltBtn" onclick="openSmelting();" style="display:none;">熔煉</button>
  </div>

  <div id="inventoryUI"></div>
  <div id="iteminventory"></div>
  <div id="hpDisplay">HP: 10</div>

  <div id="leftControls">
    <div class="control-group">
      <button ontouchstart="moveLeft();" ontouchend="stopMoving();">←</button>
      <button ontouchstart="moveRight();" ontouchend="stopMoving();">→</button>
    </div>
    <div class="control-group"><button onclick="destroyBlockDir('up')">破壞 上</button></div>
    <div class="control-group">
      <button onclick="destroyBlockDir('left')">破壞 左</button>
      <button onclick="destroyBlockDir('right')">破壞 右</button>
    </div>
    <div class="control-group"><button onclick="destroyBlockDir('down')">破壞 下</button></div>
  </div>

  <div id="rightControls">
    <div class="control-group"><button onclick="playerAttack()">攻擊</button></div>
    <div id="jumpControlGroup" class="control-group">
      <button id="jumpBtn" ontouchstart="handleJumpStart();">跳躍</button>
    </div>
    <div class="control-group"><button onclick="placeBlockDir('up')">放置 上</button></div>
    <div class="control-group">
      <button onclick="placeBlockDir('left')">放置 左</button>
      <button onclick="placeBlockDir('right')">放置 右</button>
    </div>
    <div class="control-group"><button onclick="placeBlockDir('down')">放置 下</button></div>
  </div>

  <div id="deathScreen">
    <div>你死了</div>
    <button onclick="restartGame();">重新開始</button>
  </div>

  <div id="craftingScreen">
    <h2>合成介面</h2>
    <div id="craftingOptions"></div>
    <button id="clearItemsBtn" style="display:none; background-color: #ff4444; color: white;" onclick="clearInventory()">清除所有物品</button>
    <button class="closeBtn" onclick="closeCrafting()">關閉</button>
  </div>

  <div id="smeltingScreen">
    <h2>熔煉介面</h2>
    <div id="smeltingOptions"></div>
    <button class="closeBtn" onclick="closeSmelting()">關閉</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    /* —— 參數 —— */
    const tileSize = 40, worldCols = 100, worldRows = 100;
    const groundLevel = 15, mineralStart = 35, lavaStart = 70, bedrockStart = 95;
    const gravity = 0.5, moveSpeed = 4, jumpVelocity = -12;
    
    let gameMode = "adventure", isGameRunning = false, gameOver = false;
    let player = { 
      x: 0, y: 0, width: tileSize, height: tileSize, vx: 0, vy: 0, onGround: false, health: 10,
      toolLevel: -1, injured: false, injuredTime: 0, waterStartTime: null, isNoClip: false,
      lastJumpTime: 0, spawnPoint: null, moveUp: false, moveDown: false, lastUpTime: 0, lastDownTime: 0
    };

    let worldData = [], entities = [], projectiles = [], inventory = {}, itemInventory = {};
    let selectedBlock = null, startTime = performance.now(), dayTime = 0;
    let lastLavaAtk = 0, lastVoidAtk = 0;

    const collectibleTypes = ["grass", "wood", "stone", "iron", "gold", "diamond", "coal", "water", "lava", "羊毛", "deepStone"];

    /* —— 工具 —— */
    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }
    function isSolid(type) {
      return !["water", "lava", "leaf", "火把"].includes(type);
    }
    function getItemColor(n) {
      const colors = { 
        "grass": "#00FF00", "wood": "#8B4513", "stone": "#808080", "deepStone": "#505050",
        "iron": "#FFF8E1", "gold": "#FFD700", "diamond": "#00FFFF", "coal": "#2F4F4F",
        "water": "#00BFFF", "lava": "#FF4500", "bedrock": "#3B3B3B", "leaf": "#228B22",
        "火把": "#F5DEB3", "羊毛": "#F8F8FF", "床": "#DCDCDC", "熔爐": "#808080",
        "木劍": "#CD853F", "石劍": "#A9A9A9", "鐵劍": "#D3D3D3", "鑽石劍": "#00FFFF",
        "木鎬": "#DEB887", "石鎬": "#C0C0C0", "鐵鎬": "#D3D3D3", "鑽石鎬": "#00FFFF",
        "蘋果": "#FF0000", "生豬": "#FFC0CB", "熟豬肉": "#D2B48C"
      };
      return colors[n] || "#fff";
    }

    /* —— 世界生成 —— */
    function generateWorld() {
      worldData = [];
      for (let row = 0; row < worldRows; row++) {
        for (let col = 0; col < worldCols; col++) {
          let x = col * tileSize, y = row * tileSize;
          if (row < groundLevel) continue;
          if (row === groundLevel) {
            worldData.push({ x, y, type: "grass", color: getItemColor("grass") });
            if (Math.random() < 0.1) { // 樹
              worldData.push({ x, y: y-tileSize, type: "wood", color: getItemColor("wood") });
              worldData.push({ x: x-tileSize, y: y-tileSize, type: "leaf", color: getItemColor("leaf") });
              worldData.push({ x: x+tileSize, y: y-tileSize, type: "leaf", color: getItemColor("leaf") });
              worldData.push({ x, y: y-2*tileSize, type: "leaf", color: getItemColor("leaf") });
            }
          } else if (row >= bedrockStart) {
            worldData.push({ x, y, type: "bedrock", color: getItemColor("bedrock") });
          } else {
            let r = Math.random();
            if (row < mineralStart) {
              if (r > 0.2) worldData.push({ x, y, type: "stone", color: getItemColor("stone") });
            } else if (row < lavaStart) {
              if (r < 0.1) worldData.push({ x, y, type: "iron", color: getItemColor("iron") });
              else if (r < 0.2) worldData.push({ x, y, type: "coal", color: getItemColor("coal") });
              else if (r > 0.3) worldData.push({ x, y, type: "stone", color: getItemColor("stone") });
            } else {
              if (r < 0.05) worldData.push({ x, y, type: "diamond", color: getItemColor("diamond") });
              else if (r < 0.15) worldData.push({ x, y, type: "lava", color: getItemColor("lava") });
              else worldData.push({ x, y, type: "deepStone", color: getItemColor("deepStone") });
            }
          }
        }
      }
    }

    /* —— 物理與 AI —— */
    function updatePhysics() {
      if (player.isNoClip) {
        player.x += moveDirection * (moveSpeed*2);
        if (player.moveUp) player.y -= (moveSpeed*2);
        if (player.moveDown) player.y += (moveSpeed*2);
        return;
      }

      // 橫向
      let newX = player.x + moveDirection * moveSpeed;
      if (!worldData.some(b => isSolid(b.type) && rectIntersect(newX, player.y, player.width, player.height, b.x, b.y, tileSize, tileSize))) {
        player.x = newX;
      }

      // 縱向
      player.vy += gravity;
      let newY = player.y + player.vy;
      let hit = false;
      for (let b of worldData) {
        if (isSolid(b.type) && rectIntersect(player.x, newY, player.width, player.height, b.x, b.y, tileSize, tileSize)) {
          hit = true;
          if (player.vy > 0) {
            let fall = (newY - player.fallStartY) / tileSize;
            if (fall > 3 && gameMode !== "creative") player.health -= (fall - 3);
            player.vy = 0; player.onGround = true; newY = b.y - player.height;
          } else { player.vy = 0; newY = b.y + tileSize; }
          break;
        }
      }
      if (!hit) { player.onGround = false; if (player.fallStartY === null) player.fallStartY = player.y; }
      else player.fallStartY = null;

      // 液體與環境
      let inWater = worldData.some(b => b.type === "water" && rectIntersect(player.x, player.y, player.width, player.height, b.x, b.y, tileSize, tileSize));
      let inLava = worldData.some(b => b.type === "lava" && rectIntersect(player.x, player.y, player.width, player.height, b.x, b.y, tileSize, tileSize));

      if (inWater) { player.vy *= 0.8; if(!player.waterStartTime) player.waterStartTime = Date.now(); } else player.waterStartTime = null;
      if (inLava && Date.now() - lastLavaAtk > 1000) { if(gameMode!=="creative") player.health -= 2; lastLavaAtk = Date.now(); }
      if (player.y > bedrockStart * tileSize && Date.now() - lastVoidAtk > 1000) { player.health -= 5; lastVoidAtk = Date.now(); }

      player.y = newY;
    }

    function updateEntities() {
      for (let i = entities.length - 1; i >= 0; i--) {
        let mob = entities[i];
        // 重力
        mob.vy = (mob.vy || 0) + gravity;
        let nY = mob.y + mob.vy;
        if (worldData.some(b => isSolid(b.type) && rectIntersect(mob.x, nY, mob.width, mob.height, b.x, b.y, tileSize, tileSize))) {
          mob.vy = 0; mob.onGround = true;
        } else mob.y = nY;

        // AI 邏輯
        let dist = Math.abs(player.x - mob.x);
        if (mob.type === "zombie" || mob.type === "spider") {
          mob.x += (player.x > mob.x ? 1 : -1) * 0.8;
          if (rectIntersect(mob.x, mob.y, mob.width, mob.height, player.x, player.y, player.width, player.height)) {
            if (Date.now() - (mob.lastAtk || 0) > 1000 && gameMode !== "creative") {
              player.health -= 1; mob.lastAtk = Date.now(); player.injured = true; player.injuredTime = Date.now();
            }
          }
        } else if (mob.type === "skeleton") {
          if (dist > 200) mob.x += (player.x > mob.x ? 1 : -1) * 0.8;
          else if (Date.now() - (mob.lastShot || 0) > 2000) {
            let angle = Math.atan2(player.y - mob.y, player.x - mob.x);
            projectiles.push({ x: mob.x, y: mob.y, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5, width: 10, height: 10 });
            mob.lastShot = Date.now();
          }
        } else if (mob.type === "creeper") {
          if (dist < 50) {
            if (!mob.fuse) mob.fuse = Date.now();
            if (Date.now() - mob.fuse > 1500) {
              if (dist < 100 && gameMode !== "creative") player.health -= 4;
              entities.splice(i, 1); continue;
            }
          } else mob.fuse = null, mob.x += (player.x > mob.x ? 1 : -1) * 0.7;
        } else if (mob.type === "pig" || mob.type === "sheep") {
          if (Math.random() < 0.02) mob.vx = (Math.random() - 0.5) * 2;
          mob.x += mob.vx || 0;
        }

        if (mob.hp <= 0) {
          if (mob.type === "pig") addToItemInventory("生豬", 1);
          if (mob.type === "sheep") addToInventory("羊毛", 1);
          entities.splice(i, 1);
        }
      }
    }

    /* —— 交互功能 —— */
    function destroyBlockDir(d) {
      let gridX = Math.floor((player.x + tileSize / 2) / tileSize);
      let gridY = Math.floor((player.y + tileSize / 2) / tileSize);
      if (d === 'up') gridY--; if (d === 'down') gridY++; if (d === 'left') gridX--; if (d === 'right') gridX++;
      let idx = worldData.findIndex(b => b.x === gridX * tileSize && b.y === gridY * tileSize);
      if (idx !== -1) {
        let b = worldData[idx];
        if (b.type === "bedrock" && gameMode !== "creative") return;
        if (collectibleTypes.includes(b.type)) addToInventory(b.type, 1);
        if (b.type === "leaf" && Math.random() < 0.2) addToItemInventory("蘋果", 1);
        worldData.splice(idx, 1);
      }
    }

    function placeBlockDir(d) {
      if (!selectedBlock || inventory[selectedBlock] <= 0) return;
      let gridX = Math.floor((player.x + tileSize / 2) / tileSize);
      let gridY = Math.floor((player.y + tileSize / 2) / tileSize);
      if (d === 'up') gridY--; if (d === 'down') gridY++; if (d === 'left') gridX--; if (d === 'right') gridX++;
      if (worldData.some(b => b.x === gridX * tileSize && b.y === gridY * tileSize && isSolid(b.type))) return;
      worldData.push({ x: gridX * tileSize, y: gridY * tileSize, type: selectedBlock, color: getItemColor(selectedBlock) });
      if (gameMode !== "creative") inventory[selectedBlock]--;
      updateInventoryUI();
    }

    function handleJumpStart() {
      let now = Date.now();
      if (gameMode === "creative" && now - player.lastJumpTime < 300) { toggleNoClip(); return; }
      player.lastJumpTime = now;
      if (!player.isNoClip && (player.onGround || player.waterStartTime)) player.vy = jumpVelocity;
    }

    function toggleNoClip() {
      player.isNoClip = !player.isNoClip;
      const group = document.getElementById("jumpControlGroup");
      if (player.isNoClip) {
        group.innerHTML = `
          <button ontouchstart="player.moveUp=true; player.lastUpTime=Date.now();" ontouchend="player.moveUp=false;">上</button>
          <button ontouchstart="player.moveDown=true; player.lastDownTime=Date.now();" ontouchend="player.moveDown=false;">下</button>
        `;
      } else {
        group.innerHTML = `<button id="jumpBtn" ontouchstart="handleJumpStart();">跳躍</button>`;
      }
    }

    /* —— 核心循環 —— */
    function gameLoop() {
      if (!isGameRunning) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 背景與日夜
      dayTime = ((performance.now() - startTime) % 360000) / 360000 * 2 * Math.PI;
      let light = (Math.sin(dayTime) + 1) / 2;
      document.body.style.backgroundColor = `rgb(${20+light*115}, ${20+light*186}, ${40+light*195})`;

      updatePhysics();
      updateEntities();
      
      // 箭矢
      for (let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i]; p.x += p.vx; p.y += p.vy;
        if (rectIntersect(p.x, p.y, p.width, p.height, player.x, player.y, player.width, player.height)) {
          if (gameMode !== "creative") player.health -= 0.5;
          projectiles.splice(i, 1); continue;
        }
        if (worldData.some(b => isSolid(b.type) && rectIntersect(p.x, p.y, p.width, p.height, b.x, b.y, tileSize, tileSize))) projectiles.splice(i, 1);
      }

      // 繪製
      let camX = player.x - canvas.width/2, camY = player.y - canvas.height/2;
      worldData.forEach(b => {
        if (Math.abs(b.x - player.x) < 600 && Math.abs(b.y - player.y) < 600) {
          ctx.fillStyle = b.color; ctx.fillRect(b.x - camX, b.y - camY, tileSize, tileSize);
          if (b.type === "火把") { ctx.fillStyle = "rgba(255,165,0,0.2)"; ctx.fillRect(b.x-camX-80, b.y-camY-80, 200, 200); }
        }
      });
      entities.forEach(m => {
        ctx.fillStyle = m.fuse ? "white" : getItemColor(m.type);
        ctx.fillRect(m.x - camX, m.y - camY, m.width, m.height);
      });
      projectiles.forEach(p => { ctx.fillStyle = "black"; ctx.fillRect(p.x-camX, p.y-camY, p.width, p.height); });
      
      ctx.fillStyle = (player.injured && Date.now()-player.injuredTime < 500) ? "red" : "#0000FF";
      ctx.globalAlpha = player.isNoClip ? 0.5 : 1;
      ctx.fillRect(player.x - camX, player.y - camY, player.width, player.height);
      ctx.globalAlpha = 1;

      document.getElementById("hpDisplay").innerText = "HP: " + Math.ceil(player.health);
      if (player.health <= 0) { isGameRunning = false; document.getElementById("deathScreen").style.display = "flex"; }
      
      spawnMobs();
      requestAnimationFrame(gameLoop);
    }

    function spawnMobs() {
      if (entities.length < 8 && Math.random() < 0.005) {
        let isN = light < 0.3;
        let type = "pig";
        if (gameMode !== "peaceful" && gameMode !== "creative" && isN) {
          let r = Math.random();
          if (r < 0.3) type = "zombie"; else if (r < 0.6) type = "skeleton"; else if (r < 0.8) type = "creeper"; else type = "spider";
        } else if (Math.random() < 0.5) type = "sheep";
        
        entities.push({ x: player.x + (Math.random()-0.5)*1000, y: player.y - 200, width: tileSize, height: tileSize, type, hp: 10, vy: 0 });
      }
    }

    /* —— 介面控制 —— */
    function startAdventure() { gameMode = "adventure"; initGame(); }
    function startPeaceful() { gameMode = "peaceful"; initGame(); }
    function startCreative() { gameMode = "creative"; initGame(); }
    
    function initGame() {
      generateWorld();
      player.x = 200; player.y = (groundLevel-2)*tileSize; player.health = 10;
      inventory = {}; itemInventory = {}; entities = []; projectiles = [];
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("continueBtn").style.display = "block";
      isGameRunning = true; startTime = performance.now();
      gameLoop();
    }

    function continueGame() { document.getElementById("startScreen").style.display = "none"; isGameRunning = true; gameLoop(); }
    function goToHomePage() { isGameRunning = false; document.getElementById("startScreen").style.display = "flex"; }
    function restartGame() { document.getElementById("deathScreen").style.display = "none"; initGame(); }

    function addToInventory(item, n) { inventory[item] = (inventory[item]||0) + n; updateInventoryUI(); }
    function addToItemInventory(item, n) { itemInventory[item] = (itemInventory[item]||0) + n; updateItemInventoryUI(); }
    function updateInventoryUI() {
      const c = document.getElementById("inventoryUI"); c.innerHTML = "";
      for (let i in inventory) {
        if (inventory[i]<=0) continue;
        const b = document.createElement("button"); b.innerText = i + " x" + inventory[i];
        b.style.backgroundColor = getItemColor(i);
        b.onclick = () => { selectedBlock = i; };
        c.appendChild(b);
      }
    }
    function updateItemInventoryUI() {
      const c = document.getElementById("iteminventory"); c.innerHTML = "";
      document.getElementById("smeltBtn").style.display = itemInventory["熔爐"] > 0 ? "inline-block" : "none";
      for (let i in itemInventory) {
        if (itemInventory[i]<=0) continue;
        const b = document.createElement("button"); b.innerText = i + " x" + itemInventory[i];
        b.style.backgroundColor = getItemColor(i);
        b.onclick = () => { if(i==="生豬" || i==="熟豬肉" || i==="蘋果") { player.health = Math.min(10, player.health+3); itemInventory[i]--; updateItemInventoryUI(); } };
        c.appendChild(b);
      }
    }

    function openCrafting() {
      const c = document.getElementById("craftingOptions"); c.innerHTML = "";
      document.getElementById("clearItemsBtn").style.display = gameMode === "creative" ? "block" : "none";
      const recipes = [
        { n: "木鎬", m: { "wood": 3 } }, { n: "石鎬", m: { "stone": 3 } },
        { n: "火把", m: { "coal": 1, "wood": 1 } }, { n: "熔爐", m: { "stone": 8 } }
      ];
      recipes.forEach(r => {
        const b = document.createElement("button"); b.innerText = r.n;
        b.onclick = () => { addToItemInventory(r.n, 1); };
        c.appendChild(b);
      });
      document.getElementById("craftingScreen").style.display = "block";
    }
    function closeCrafting() { document.getElementById("craftingScreen").style.display = "none"; }
    function clearInventory() { inventory = {}; itemInventory = {}; updateInventoryUI(); updateItemInventoryUI(); }

    let moveDirection = 0;
    function moveLeft() { moveDirection = -1; }
    function moveRight() { moveDirection = 1; }
    function stopMoving() { moveDirection = 0; }
    function playerAttack() {
      entities.forEach(m => { if(Math.abs(m.x-player.x) < 80) m.hp -= 3; });
